<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재미있는 미니게임 모음</title>
    <meta name="description" content="6살 아이를 위한 재미있는 국기 맞추기, 시계 읽기 미니게임 웹사이트입니다.">
    <!-- Google Fonts: 아이들이 읽기 편하고 둥글둥글한 Fredoka 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Flag Icons (CDN): 국기 아이콘 렌더링에 사용 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css"/>
    
    <style>
        /* 
          디자인 가이드라인 반영 사항
          - 파스텔 톤의 화사한 배경색과 버튼 색상
          - 둥글고 큰(UI) 컴포넌트
          - 큼직한 텍스트
        */
        :root {
            /* 파스텔 톤 색상표 */
            --primary-color: #FFB7B2; /* 파스텔 핑크/레드 (메인 포인트) */
            --secondary-color: #A1C4FD; /* 파스텔 블루 (배경 무늬용) */
            --accent-color: #FFDAC1; /* 파스텔 살구색 */
            --bg-color: #FDFBFB; /* 아주 밝은 배경 */
            --text-color: #4A4A4A; /* 먹색(너무 진하지 않은 검정) */
            --card-bg: #FFFFFF;
            
            --btn-green: #A8E6CF; /* 파스텔 그린 (정답) */
            --btn-green-hover: #8FDFBE;
            --btn-yellow: #FFF1AA; /* 파스텔 옐로우 (힌트) */
            --btn-yellow-hover: #FFE681;
            --btn-red: #FFABAB; /* 파스텔 레드 (오답) */
            
            /* 그림자 및 모서리 둥글기 (크고 둥글게) */
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 15px rgba(0,0,0,0.1);
            --shadow-lg: 0 15px 25px rgba(0,0,0,0.15);
            --radius-lg: 32px;
            --radius-md: 24px;
            --radius-sm: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            /* 아이들이 좋아할 만한 귀엽고 은은한 도트 배경 패턴 */
            background-image: radial-gradient(var(--secondary-color) 3px, transparent 3px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            background-attachment: fixed;
        }

        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* 싱글 페이지 애플리케이션 화면 전환 뷰 */
        .view {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [Home View] 메인 페이지 디자인 */
        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }
        header h1 {
            font-size: 3.5rem; /* 글씨 큼직하게 */
            color: #FF9A9E; /* 진한 파스텔 핑크 */
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }
        header p {
            font-size: 1.8rem;
            color: #777;
        }

        .game-list {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        /* 게임 선택 카드 (크고 둥글게) */
        .game-card {
            background: var(--card-bg);
            border: 4px solid var(--accent-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
            text-decoration: none;
        }

        .game-card:hover {  /* 인터랙션 (호버 애니메이션) */
            transform: translateY(-15px) scale(1.05);
            box-shadow: var(--shadow-lg);
            border-color: #FF9A9E;
        }

        .card-icon-wrap {
            width: 100%;
            height: 180px;
            background: #FFF9F9;
            border-radius: var(--radius-md);
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px; /* 이모지 아이콘 적용 */
        }

        .game-card h2 {
            font-size: 2.2rem;
            color: #FF9A9E;
        }

        /* [Game Views Shared] 게임 화면 공통 적용 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 25px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .btn-back {
            background: #F0F4F8;
            border: none;
            border-radius: var(--radius-md);
            padding: 10px 20px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-back:hover {
            transform: translateX(-5px);
            background: #E2E8F0;
        }

        .score-board {
            font-size: 1.8rem;
            font-weight: 700;
            color: #FF9A9E;
            background: #FFF0F0;
            padding: 10px 20px;
            border-radius: var(--radius-md);
        }

        .game-content {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .question-text {
            font-size: 2.5rem;
            margin-bottom: 35px;
            text-align: center;
            color: #34495E;
        }

        /* 게임 본문 2단 배치 (가로 스크롤 방지 및 너비 활용) */
        .game-main-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start; /* 힌트 팝업 시 왼쪽 버튼이 아래로 밀리는 현상 방지 */
            width: 100%;
            gap: 40px;
            min-height: 320px; /* 힌트 영역만큼 미리 공간 확보 */
        }

        .game-left-col, .game-right-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        /* 객관식 보기 격자 형태 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
        }

        /* 4지선다 버튼 */
        .btn-option {
            background: #F8FAFC;
            border: 4px solid #E2E8F0;
            border-radius: var(--radius-md);
            padding: 25px 10px;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: inherit;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            white-space: nowrap; /* 글자 줄바꿈 방지 */
            word-break: keep-all; /* 단어 끊김 방지 */
            box-shadow: 0 4px 0 #E2E8F0; /* 누르는 입체감 표현 */
        }

        .btn-option:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #E2E8F0;
        }

        .btn-option:hover {
            background: #F1F5F9;
            transform: translateY(-2px);
            border-color: #CBD5E1;
        }
        /* 정답 시 효과 */
        .btn-option.correct {
            background: var(--btn-green);
            border-color: #8FDFBE;
            color: #2D3748;
            box-shadow: 0 4px 0 #8FDFBE;
            animation: bounceCorrect 0.6s;
        }
        /* 오답 시 효과 */
        .btn-option.wrong {
            background: var(--btn-red);
            border-color: #FFA0A0;
            color: #2D3748;
            box-shadow: 0 4px 0 #FFA0A0;
            animation: shakeWrong 0.5s;
            opacity: 0.8;
        }

        @keyframes bounceCorrect {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 
            40% {transform: translateY(-20px);} 
            60% {transform: translateY(-10px);} 
        }

        @keyframes shakeWrong {
            0% {transform: translateX(0);}
            25% {transform: translateX(-15px);}
            50% {transform: translateX(15px);}
            75% {transform: translateX(-15px);}
            100% {transform: translateX(0);}
        }

        /* 기능 버튼들 (힌트, 다음 문제) */
        .action-buttons {
            margin-top: 35px;
            display: flex;
            gap: 20px;
        }
        .btn-action {
            border: none;
            border-radius: var(--radius-lg);
            padding: 20px 40px;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            transition: all 0.1s;
            color: #333;
        }
        .btn-action:active {
            transform: translateY(6px);
            box-shadow: none;
        }
        .btn-yellow {
            background: var(--btn-yellow);
        }
        .btn-green {
            background: var(--btn-green);
        }
        .hidden {
            display: none !important;
        }

        /* 텍스트 피드백 ("정답이에요!", "다시 해볼까?" 등) */
        .feedback-text {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 25px;
            min-height: 45px;
            text-align: center;
        }
        .feedback-text.success { color: #27AE60; }
        .feedback-text.error { color: #E74C3C; }

        /* [Game 1] 국기 맞추기 게임 디자인 요소 */
        .flag-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .flag-container {
            width: 360px;
            height: 240px;
            border: 6px solid #CBD5E1;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            background: #EEE;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .flag-container .fi {
            font-size: 360px; /* 국기를 아주 크게 */
            line-height: 1;
        }

        .hint-section {
            background: #FFFDF0;
            padding: 20px;
            border-radius: var(--radius-md);
            border: 3px dashed #F1C40F;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }
        #hint-image {
            max-width: 100%;
            max-height: 200px; /* 이미지가 너무 커서 레이아웃을 해치는 것 방지 */
            object-fit: contain;
            border-radius: var(--radius-sm);
            margin-bottom: 15px;
        }
        .hint-section p {
            font-size: 1.6rem;
            color: #555;
            font-weight: 700;
        }

        /* [Game 2] 아날로그 시계 게임 디자인 요소 */
        .clock-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .clock-container {
            display: flex;
            justify-content: center;
        }
        
        .analog-clock {
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 28px solid var(--secondary-color); /* 파스텔 블루 테두리 */
            background: white;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05), 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #FF9A9E; /* 파스텔 레드 코어 */
            border-radius: 50%;
            z-index: 10;
        }
        
        /* 시계 바늘 공통 속성 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }
        /* 시침 */
        .hour-hand {
            width: 24px;
            height: 150px;
            background: #FF9A9E; /* 시침은 짧고 굵은 파스텔 레드 */
            margin-left: -12px;
            z-index: 8;
            border-radius: 20px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* 분침 */
        .min-hand {
            width: 16px;
            height: 230px;
            background: #A1C4FD; /* 분침은 길고 파스텔 블루 */
            margin-left: -8px;
            z-index: 7;
            border-radius: 20px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 시계 숫자판 설계 (가독성을 위해 연하게 배치) */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            display: none; /* 기본 숨김 (문제 모드) */
            z-index: 15; /* 바늘(7, 8) 위로 올라오도록 설정 */
        }
        
        .num-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px; /* 테두리와 여백 */
        }

        .hour-text {
            font-size: 4.5rem;
            font-weight: 900;
            color: #FF9A9E; /* 핑크색으로 시침과 색상 통일 */
            line-height: 1;
        }

        .minute-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: #A1C4FD; /* 파란색 분 단위 (분침과 통일) */
            margin-top: -4px;
            background: rgba(255,255,255,0.8);
            border-radius: 12px;
            padding: 0 10px;
        }

        .analog-clock.show-numbers .number {
            display: block; /* 힌트보기 시 노출 */
        }
        
        /* 숫자들을 둥글게 원형으로 배치하기 위한 CSS Rotate */
        .number-1 { transform: rotate(30deg); }   .number-1 .num-wrapper { transform: rotate(-30deg); }
        .number-2 { transform: rotate(60deg); }   .number-2 .num-wrapper { transform: rotate(-60deg); }
        .number-3 { transform: rotate(90deg); }   .number-3 .num-wrapper { transform: rotate(-90deg); }
        .number-4 { transform: rotate(120deg); }  .number-4 .num-wrapper { transform: rotate(-120deg); }
        .number-5 { transform: rotate(150deg); }  .number-5 .num-wrapper { transform: rotate(-150deg); }
        .number-6 { transform: rotate(180deg); }  .number-6 .num-wrapper { transform: rotate(-180deg); }
        .number-7 { transform: rotate(210deg); }  .number-7 .num-wrapper { transform: rotate(-210deg); }
        .number-8 { transform: rotate(240deg); }  .number-8 .num-wrapper { transform: rotate(-240deg); }
        .number-9 { transform: rotate(270deg); }  .number-9 .num-wrapper { transform: rotate(-270deg); }
        .number-10 { transform: rotate(300deg); } .number-10 .num-wrapper { transform: rotate(-300deg); }
        .number-11 { transform: rotate(330deg); } .number-11 .num-wrapper { transform: rotate(-330deg); }
        .number-12 { transform: rotate(360deg); } .number-12 .num-wrapper { transform: rotate(-360deg); }

        /* 반응형 (세로 화면 대응) */
        @media screen and (max-width: 768px) {
            .game-main-row {
                flex-direction: column;
                gap: 20px;
            }
        }
        @media screen and (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .analog-clock {
                width: 240px; height: 240px;
            }
            .hour-hand { height: 60px; }
            .min-hand { height: 90px; }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        
        <!-- ==============================
             [메인 메뉴 화면] View 컴포넌트 
             ============================== -->
        <section id="home-view" class="view active">
            <header>
                <h1>✨ 미니게임 놀이터 ✨</h1>
                <p>재미있는 게임을 골라보세요!</p>
            </header>
            <div class="game-list">
                <button class="game-card" onclick="app.startGame('flag')">
                    <!-- 별도 이미지 파일 대신 이모지 활용으로 외부 의존도 제거 -->
                    <div class="card-icon-wrap">🚩</div>
                    <h2>국기 맞추기</h2>
                </button>
                <button class="game-card" onclick="app.startGame('animal')">
                    <div class="card-icon-wrap">🐶</div>
                    <h2>동물 이름 맞추기</h2>
                </button>
                <button class="game-card" onclick="app.startGame('clock')">
                    <div class="card-icon-wrap">⏰</div>
                    <h2>시계 읽기</h2>
                </button>
            </div>
        </section>

        <!-- ==============================
             [국기 게임 화면] View 컴포넌트 
             ============================== -->
        <section id="flag-view" class="view">
            <header class="game-header">
                <button class="btn-back" onclick="app.goHome()">🔙 홈으로</button>
                <div class="score-board">점수: <span id="flag-score">0</span> / <span id="flag-total">0</span></div>
            </header>
            <div class="game-content">
                <h2 class="question-text">이 국기는 어느 나라일까요?</h2>
                
                <!-- 국기 중앙 크게 표시 -->
                <div class="flag-wrapper">
                    <div class="flag-container">
                        <span id="flag-display" class="fi"></span>
                    </div>
                </div>
                
                <div class="game-main-row">
                    <!-- 좌측: 문제 (정답 박스 및 액션 버튼) -->
                    <div class="game-left-col">
                        <div class="options-grid" id="flag-options">
                            <!-- 동기로 버튼들이 렌더링 됩니다 -->
                        </div>
                        
                        <!-- 힌트버튼이 밀리는 현상을 원천 차단하기 위해 좌측 칼럼 안으로 이동 -->
                        <div class="action-buttons">
                            <button id="btn-hint" class="btn-action btn-yellow" onclick="flagGame.toggleHint()">💡 힌트 보기</button>
                            <button id="btn-next-flag" class="btn-action btn-green hidden" onclick="flagGame.nextQuestion()">다음 문제 ➡️</button>
                        </div>
                    </div>
                    
                    <!-- 우측: 힌트 화면 -->
                    <div class="game-right-col" id="flag-hint-wrapper">
                        <!-- 처음에 영역만 유지하여 덜덜거림 방지 -->
                        <div id="hint-section" class="hint-section hidden">
                            <img id="hint-image" src="" alt="힌트 이미지">
                            <p id="hint-text"></p>
                        </div>
                    </div>
                </div>
                
                <div id="flag-feedback" class="feedback-text"></div>
            </div>
        </section>

        <!-- ==============================
             [동물 맞추기 게임 화면] View 컴포넌트 
             ============================== -->
        <section id="animal-view" class="view">
            <header class="game-header">
                <button class="btn-back" onclick="app.goHome()">🔙 홈으로</button>
                <div class="score-board">점수: <span id="animal-score">0</span> / <span id="animal-total">0</span></div>
            </header>
            <div class="game-content">
                <h2 class="question-text">이 동물의 영어 이름은 무엇일까요?</h2>
                
                <!-- 동물 사진 중앙 표시 -->
                <div class="flag-wrapper">
                    <!-- flag 스타일을 재활용하지만 크기나 여백 등을 조금 다르게 할 수도 있음 여기서는 그대로 사용 -->
                    <div class="flag-container" style="background:#fff; border-color:#FFDAC1; display:flex; justify-content:center; align-items:center;">
                        <div id="animal-emoji" style="font-size: 10rem; line-height: 1; user-select: none;">🐶</div>
                    </div>
                </div>
                
                <div class="game-main-row">
                    <!-- 좌측: 보기 옵션 및 버튼 -->
                    <div class="game-left-col">
                        <div class="options-grid" id="animal-options">

        // 뽑힌적이 없는 나라 중에서 가중치에 따라 1개를 랜덤 선택하는 함수
        function getRandomCountry(excludeList = []) {
            let pool = countriesData.filter(c => !excludeList.includes(c.code));
            let totalWeight = pool.reduce((sum, c) => sum + c.weight, 0);
            let rand = Math.random() * totalWeight;
            
            for (let i = 0; i < pool.length; i++) {
                rand -= pool[i].weight;
                if (rand <= 0) return pool[i];
            }
            return pool[pool.length - 1]; // 만약을 대비한 안전 폴백
        }

        // 보기 생성을 위해 여러개의 나라를 중복없이 뽑는 함수
        function getMultipleRandomCountries(count) {
            let result = [];
            let exclude = [];
            for(let i=0; i<count; i++) {
                let c = getRandomCountry(exclude);
                result.push(c);
                exclude.push(c.code);
            }
            return result;
        }

        // 뽑힌적이 없는 동물 중에서 무작위로 선택하는 함수
        function getRandomAnimal(excludeList = []) {
            let pool = animalsData.filter(a => !excludeList.includes(a.code));
            let totalWeight = pool.reduce((sum, a) => sum + a.weight, 0);
            let rand = Math.random() * totalWeight;

                rand -= pool[i].weight;

        function getMultipleRandomAnimals(count) {
            let result = [];
            let exclude = [];

        /**
         * [시간 데이터 모델]
         * 정각과 30분 단위 출제 빈도를 60% 이상으로 유지
         */
        const clockDifficulties = [
            // 난이도 1: 정각 (40%)
            { type: 'hour', weight: 40, gen: () => { let h = Math.floor(Math.random()*12)+1; return {h, m: 0, str: h + "시 정각", digital: h + ":00"}; } },
            // 난이도 2: 30분 반 (30%) - 이로써 정각+30분이 70%의 비중을 차지함!
            { type: 'half', weight: 30, gen: () => { let h = Math.floor(Math.random()*12)+1; return {h, m: 30, str: h + "시 30분", digital: h + ":30"}; } },
            // 난이도 3: 15분, 45분 단위 (15%)
            { type: 'quarter', weight: 15, gen: () => { let h = Math.floor(Math.random()*12)+1; let m = Math.random() > 0.5 ? 15 : 45; return {h, m, str: `${h}시 ${m}분`, digital: `${h}:${m}`}; } },
            // 난이도 4: 기타 10분 단위 (15%)
            { type: 'ten', weight: 15, gen: () => { let h = Math.floor(Math.random()*12)+1; let arr = [10,20,40,50]; let m = arr[Math.floor(Math.random()*arr.length)]; return {h, m, str: `${h}시 ${m}분`, digital: `${h}:${m}`}; } }
        ];

        function getRandomTime() {
            let totalWeight = clockDifficulties.reduce((sum, d) => sum + d.weight, 0);
            let rand = Math.random() * totalWeight;
            for(let i=0; i<clockDifficulties.length; i++) {
                rand -= clockDifficulties[i].weight;
                if(rand <= 0) return clockDifficulties[i].gen();
            }
            return clockDifficulties[0].gen();
        }

        /**
         * [전체 앱 라우팅 로직 (SPA)]
         */
        const app = {
            views: ['home-view', 'flag-view', 'clock-view', 'animal-view'],
            
            startGame(type) {
                if (type === 'flag') {
                    this.showView('flag-view');
                    flagGame.init();
                } else if (type === 'clock') {
                    this.showView('clock-view');
                    clockGame.init();
                } else if (type === 'animal') {
                    this.showView('animal-view');
                    animalGame.init();
                }
            },
            
            goHome() {
                this.showView('home-view');
            },
            
            // 모든 뷰를 가리고 해당 뷰만 active를 주어 표시
            showView(viewId) {
                this.views.forEach(id => {
                    document.getElementById(id).classList.remove('active');
                });
                document.getElementById(viewId).classList.add('active');
            }
        };

        /**
         * [국기 맞추기 게임 로직]
         */
        const flagGame = {
            totalQuestions: 0,
            correctAnswers: 0,
            currentCountry: null,
            wrongAttempts: 0,
            hintVisible: false,

            init() {
                this.totalQuestions = 0;
                this.correctAnswers = 0;
                this.updateScore();
                this.startNextQuestion();
            },

            updateScore() {
                document.getElementById('flag-total').textContent = this.totalQuestions;
                document.getElementById('flag-score').textContent = this.correctAnswers;
            },

            startNextQuestion() {
                this.wrongAttempts = 0;
                this.hintVisible = false;
                
                // UI 초기화 (힌트, 버튼 숨기기)
                document.getElementById('hint-section').classList.add('hidden');
                document.getElementById('btn-next-flag').classList.add('hidden');
                document.getElementById('flag-feedback').textContent = '';
                document.getElementById('flag-feedback').className = 'feedback-text';
                
                const btnHint = document.getElementById('btn-hint');
                btnHint.textContent = '💡 힌트 보기';
                btnHint.classList.remove('btn-gray');
                btnHint.classList.add('btn-yellow');

                // 랜덤 국기 4개 추출
                let countries = getMultipleRandomCountries(4);
                
                // 그 중 하나를 무작위로 정답 처리
                this.currentCountry = countries[Math.floor(Math.random() * 4)];
                
                // 국기 아이콘 업데이트 (flag-icons 라이브러리 클래스 변경)
                document.getElementById('flag-display').className = `fi fi-${this.currentCountry.code}`;
                
                // 힌트 내용이 있으면 힌트 버튼 보여주기
                if (this.currentCountry.hintImage || this.currentCountry.hintText) {
                    document.getElementById('btn-hint').classList.remove('hidden');
                } else {
                    document.getElementById('btn-hint').classList.add('hidden');
                }
                
                // 보기 버튼 동적 생성
                const optionsContainer = document.getElementById('flag-options');
                optionsContainer.innerHTML = '';
                
                countries.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option';
                    btn.textContent = c.name;
                    btn.onclick = () => this.checkAnswer(btn, c);
                    optionsContainer.appendChild(btn);
                });
            },

            // 힌트보기 클릭 시 작동 (토글 기능)
            toggleHint() {
                this.hintVisible = !this.hintVisible;
                const hintSec = document.getElementById('hint-section');
                const btn = document.getElementById('btn-hint');
                
                if (this.hintVisible) {
                    // 힌트 켜기
                    hintSec.classList.remove('hidden');
                    const hintImg = document.getElementById('hint-image');
                    const hintText = document.getElementById('hint-text');
                    
                    if (this.currentCountry.hintImage) {
                        hintImg.src = this.currentCountry.hintImage;
                        hintImg.style.display = 'inline-block';
                    } else {
                        hintImg.style.display = 'none';
                    }
                    hintText.textContent = this.currentCountry.hintText || '힌트가 없어요! 잘 생각해 보세요.';
                    
                    btn.textContent = '❌ 힌트 숨기기';
                    btn.classList.remove('btn-yellow');
                    btn.classList.add('btn-gray'); /* 회색 버튼으로 전환 효과를 줄 수도 있음 */
                } else {
                    // 힌트 끄기
                    hintSec.classList.add('hidden');
                    btn.textContent = '💡 힌트 보기';
                    btn.classList.remove('btn-gray');
                    btn.classList.add('btn-yellow');
                }
            },

            // 답을 선택했을 때 체크하는 부분
            checkAnswer(btn, clickedCountry) {
                // 이미 정답이 공개된 상태라면 입력을 처리하지 않음
                if (!document.getElementById('btn-next-flag').classList.contains('hidden')) return;

                const feedback = document.getElementById('flag-feedback');

                // 정답 로직
                if (clickedCountry.code === this.currentCountry.code) {
                    btn.classList.add('correct');
                    feedback.textContent = '정답이에요! 참 잘했어요 🥳!!';
                    feedback.className = 'feedback-text success';
                    this.correctAnswers++;
                    this.totalQuestions++;
                    this.updateScore();
                    this.revealAnswers(); // 나머지 처리
                } 
                // 오답 로직
                else {
                    btn.classList.add('wrong');
                    btn.style.pointerEvents = 'none'; // 이미 고른 오답은 재클릭 방지
                    this.wrongAttempts++;
                    
                    if (this.wrongAttempts >= 2) {
                        // 두 번 틀리면 정답을 자동으로 공개하고 카운트 증가 처리
                        feedback.textContent = `아쉬워요! 정답은 '${this.currentCountry.name}' 이랍니다!`;
                        feedback.className = 'feedback-text error';
                        this.totalQuestions++;
                        this.updateScore();
                        this.revealAnswers();
                    } else {
                        // 한 번 틀렸을 때의 재도전 메시지
                        feedback.textContent = '앗, 다시 한번 해볼까? 🤔 (기회가 1번 남았어요!)';
                        feedback.className = 'feedback-text error';
                    }
                }
            },

            // 화면을 잠금하고 "다음 문제" 버튼 띄우기
            revealAnswers() {
                const buttons = document.querySelectorAll('#flag-options .btn-option');
                buttons.forEach(btn => {
                    // 혹시 정답을 못맞췄다면 초록색으로 답을 표시해줌
                    if (btn.textContent === this.currentCountry.name) {
                        btn.classList.add('correct');
                    }
                    btn.style.pointerEvents = 'none'; // 클릭 방지
                });
                
                document.getElementById('btn-next-flag').classList.remove('hidden');
                document.getElementById('btn-hint').classList.add('hidden'); // 힌트 버튼 숨김
            },

            nextQuestion() {
                this.startNextQuestion();
            }
        };

        /**
         * [시계 읽기 게임 로직]
         */
        const clockGame = {
            totalQuestions: 0,
            correctAnswers: 0,
            currentTimeObj: null,
            hintVisible: false,
            wrongAttempts: 0,

            init() {
                this.totalQuestions = 0;
                this.correctAnswers = 0;
                this.updateScore();
                this.startNextQuestion();
            },

            updateScore() {
                document.getElementById('clock-total').textContent = this.totalQuestions;
                document.getElementById('clock-score').textContent = this.correctAnswers;
            },

            startNextQuestion() {
                this.hintVisible = false;
                this.wrongAttempts = 0;
                // UI 초기화
                document.getElementById('btn-next-clock').classList.add('hidden');
                
                const btnHint = document.getElementById('btn-clock-hint');
                btnHint.classList.remove('hidden');
                btnHint.textContent = '💡 힌트 보기';
                btnHint.classList.remove('btn-gray');
                btnHint.classList.add('btn-yellow');
                document.getElementById('clock-feedback').textContent = '';
                document.getElementById('clock-feedback').className = 'feedback-text';
                
                // 시계판 숫자 가리기
                document.querySelector('.analog-clock').classList.remove('show-numbers');

                // 난이도별 시간 랜덤 추출
                this.currentTimeObj = getRandomTime();
                
                // 시계 바늘 각도 계산 및 CSS 회전(Transform) 반영 !!
                const hourHand = document.getElementById('hour-hand');
                const minHand = document.getElementById('min-hand');
                
                // 분침: 60분에 360도 즉, 1분당 6도 회전
                const minAngle = this.currentTimeObj.m * 6;
                // 시침: 12시간에 360도 (1시간에 30도) + 분에 비례한 이동(1분당 0.5도)
                const hourAngle = (this.currentTimeObj.h % 12) * 30 + (this.currentTimeObj.m * 0.5);
                
                hourHand.style.transform = `rotate(${hourAngle}deg)`;
                minHand.style.transform = `rotate(${minAngle}deg)`;

                // 객관식 4개 생성 (오답 3개 + 정답 1개)
                let options = [this.currentTimeObj];
                while(options.length < 4) {
                    let fakeTime = getRandomTime();
                    // 보기 안에 동일한 시간이 없도록 확인
                    if (!options.some(t => t.digital === fakeTime.digital)) {
                        options.push(fakeTime);
                    }
                }
                
                // 보기 무작위 섞기
                options.sort(() => Math.random() - 0.5);

                const optionsContainer = document.getElementById('clock-options');
                optionsContainer.innerHTML = '';

                // 보기 버튼 렌더링
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option';
                    // "3시 정각", "3시 30분" 등 읽기 쉬운 문자로 선택지 제공
                    btn.textContent = opt.str; 
                    btn.onclick = () => this.checkAnswer(btn, opt);
                    optionsContainer.appendChild(btn);
                });
            },
            
            toggleHint() {
                this.hintVisible = !this.hintVisible;
                const clock = document.querySelector('.analog-clock');
                const btn = document.getElementById('btn-clock-hint');

                if (this.hintVisible) {
                    clock.classList.add('show-numbers');
                    btn.textContent = '❌ 힌트 숨기기';
                    btn.classList.remove('btn-yellow');
                    btn.classList.add('btn-gray');
                } else {
                    clock.classList.remove('show-numbers');
                    btn.textContent = '💡 힌트 보기';
                    btn.classList.remove('btn-gray');
                    btn.classList.add('btn-yellow');
                }
            },

            checkAnswer(btn, clickedTime) {
                if (!document.getElementById('btn-next-clock').classList.contains('hidden')) return;

                const feedback = document.getElementById('clock-feedback');

                // 정답인 경우
                if (clickedTime.digital === this.currentTimeObj.digital) {
                    btn.classList.add('correct');
                    feedback.textContent = '딩동댕! 정말 잘 맞췄어요! ⏰';
                    feedback.className = 'feedback-text success';
                    this.correctAnswers++;
                } 
                // 오답인 경우
                else {
                    btn.classList.add('wrong');
                    btn.style.pointerEvents = 'none'; // 오답버튼 비활성화
                    this.wrongAttempts++;
                    
                    if (this.wrongAttempts >= 2) {
                        feedback.textContent = `아쉬워요! 정답은 '${this.currentTimeObj.str}' 이었어요!`;
                        feedback.className = 'feedback-text error';
                        
                        // 정답 버튼 힌트 표시 (revealAnswers에서 일괄 처리되지만 시각적 보완용)
                        const buttons = document.querySelectorAll('#clock-options .btn-option');
                        buttons.forEach(b => {
                            if (b.textContent === this.currentTimeObj.str) {
                                b.classList.add('correct');
                            }
                        });
                        
                        this.totalQuestions++;
                        this.updateScore();
                        this.revealAnswers();
                    } else {
                        feedback.textContent = '앗, 시간을 다시 한 번 자세히 볼까? 🤔 (기회 1번 남음!)';
                        feedback.className = 'feedback-text error';
                    }
                }
            },

            // 선택 후 버튼 비활성화 및 다음 버튼 생성을 담당
            revealAnswers() {
                const buttons = document.querySelectorAll('#clock-options .btn-option');
                buttons.forEach(btn => {
                    btn.style.pointerEvents = 'none'; // 클릭 방지
                });
                document.getElementById('btn-next-clock').classList.remove('hidden');
                document.getElementById('btn-clock-hint').classList.add('hidden'); // 힌트 버튼 숨김
            },

            nextQuestion() {
                this.startNextQuestion();
            }
        };

        /**
         * [동물 이름 맞추기 게임 로직]
         */
        const animalGame = {
            totalQuestions: 0,
            correctAnswers: 0,
            currentAnimal: null,
            wrongAttempts: 0,
            hintLevel: 0, // 0: 숨김, 1: 글자수(자리수), 2: 일부 글자 보임
            revealIndices: [],

            init() {
                this.totalQuestions = 0;
                this.correctAnswers = 0;
                this.updateScore();
                this.startNextQuestion();
            },

            updateScore() {
                document.getElementById('animal-total').textContent = this.totalQuestions;
                document.getElementById('animal-score').textContent = this.correctAnswers;
            },

            startNextQuestion() {
                this.wrongAttempts = 0;
                this.hintLevel = 0;
                
                // UI 초기화
                document.getElementById('animal-hint-section').classList.add('hidden');
                document.getElementById('btn-next-animal').classList.add('hidden');
                document.getElementById('animal-feedback').textContent = '';
                document.getElementById('animal-feedback').className = 'feedback-text';
                
                const btnHint = document.getElementById('btn-animal-hint');
                btnHint.textContent = '💡 힌트 보기 (1단계)';
                btnHint.classList.remove('btn-gray');
                btnHint.classList.add('btn-yellow');
                btnHint.classList.remove('hidden');

                // 랜덤 동물 4개 추출
                let animals = getMultipleRandomAnimals(4);
                this.currentAnimal = animals[Math.floor(Math.random() * 4)];
                
                // 동물 이모지 업데이트 (이미지 대신 예쁜 벡터 이모지 연동)
                document.getElementById('animal-emoji').textContent = this.currentAnimal.emoji;
                
                // 힌트 2단계 적용을 위한 인덱스 계산 (단어 길이의 1/3을 올림하여 공개할 글자 수 결정)
                let wordLength = this.currentAnimal.name.length;
                let charsRevealCount = Math.max(1, Math.ceil(wordLength / 3));
                let indices = Array.from({length: wordLength}, (_, i) => i);
                indices.sort(() => Math.random() - 0.5);
                this.revealIndices = indices.slice(0, charsRevealCount);

                // 보기 생성
                const optionsContainer = document.getElementById('animal-options');
                optionsContainer.innerHTML = '';
                
                animals.forEach(a => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option';
                    btn.textContent = a.name;
                    btn.onclick = () => this.checkAnswer(btn, a);
                    optionsContainer.appendChild(btn);
                });
            },

            toggleHint() {
                this.hintLevel++;
                if (this.hintLevel > 2) {
                    this.hintLevel = 0;
                }
                
                const hintSec = document.getElementById('animal-hint-section');
                const btn = document.getElementById('btn-animal-hint');
                const hintText = document.getElementById('animal-hint-text');
                
                if (this.hintLevel === 0) {
                    // 힌트 끄기
                    hintSec.classList.add('hidden');
                    btn.textContent = '💡 힌트 보기 (1단계)';
                    btn.classList.remove('btn-gray');
                    btn.classList.add('btn-yellow');
                } else {
                    // 힌트 켜기
                    hintSec.classList.remove('hidden');
                    
                    let word = this.currentAnimal.name.toUpperCase();
                    let displayArr = [];
                    
                    for(let i=0; i<word.length; i++) {
                        if (this.hintLevel === 1) {
                            displayArr.push('_'); // 1단계: 모두 빈칸
                        } else {
                            if (this.revealIndices.includes(i)) {
                                displayArr.push(word[i]); // 2단계: 일부 공개
                            } else {
                                displayArr.push('_');
                            }
                        }
                    }
                    
                    // 글자 폭이 넓은 (예: ELEPHANT) 경우 삐져나감을 방지하기 위해 font-size 줄이고 줄바꿈 허용 (word-break 적용)
                    hintText.innerHTML = `한국어 뜻: <b>${this.currentAnimal.krName}</b><br><br>단어 힌트:<br><div style="font-size:2.8rem; letter-spacing:5px; font-weight:900; color:#555; word-wrap:break-word; word-break:break-all; line-height:1.4; padding-top:10px;">${displayArr.join('')}</div>`;
                    
                    if (this.hintLevel === 1) {
                        btn.textContent = '💡 힌트 더 보기 (2단계)';
                        btn.classList.remove('btn-gray');
                        btn.classList.add('btn-yellow');
                    } else if (this.hintLevel === 2) {
                        btn.textContent = '❌ 힌트 숨기기';
                        btn.classList.remove('btn-yellow');
                        btn.classList.add('btn-gray');
                    }
                }
            },

            checkAnswer(btn, clickedAnimal) {
                if (!document.getElementById('btn-next-animal').classList.contains('hidden')) return;

                const feedback = document.getElementById('animal-feedback');
                const hintSec = document.getElementById('animal-hint-section');
                const hintText = document.getElementById('animal-hint-text');
                const hintBtn = document.getElementById('btn-animal-hint');
                let word = this.currentAnimal.name.toUpperCase();

                if (clickedAnimal.code === this.currentAnimal.code) {
                    btn.classList.add('correct');
                    feedback.textContent = '정답이에요! 참 잘했어요!!';
                    feedback.className = 'feedback-text success';
                    this.correctAnswers++;
                    this.totalQuestions++;
                    this.updateScore();
                    this.revealAnswers();
                    
                    // 정답 공개 시 스펠링 완전 표시 (삐져나가지 않도록 스케일 조정 및 자동바꿈)
                    hintSec.classList.remove('hidden');
                    hintText.innerHTML = `한국어 뜻: <b>${this.currentAnimal.krName}</b><br><br>단어 정답:<br><div style="font-size:3rem; letter-spacing:5px; font-weight:900; color:#555; word-wrap:break-word; word-break:break-all; line-height:1.4; padding-top:10px;">${word}</div>`;
                    hintBtn.classList.add('hidden');
                } else {
                    btn.classList.add('wrong');
                    btn.style.pointerEvents = 'none'; // 오답 비활성화
                    this.wrongAttempts++;
                    
                    if (this.wrongAttempts >= 2) {
                        feedback.textContent = `아쉬워요! 정답은 '${this.currentAnimal.name}' 이랍니다!`;
                        feedback.className = 'feedback-text error';
                        this.totalQuestions++;
                        this.updateScore();
                        this.revealAnswers();
                        
                        // 기회 2번 소진 시 정답 스펠링 완전 표시 (빨간색으로 강조, 삐져나가지 않게 제한)
                        hintSec.classList.remove('hidden');
                        hintText.innerHTML = `정답 스펠링:<br><div style="font-size:3rem; letter-spacing:5px; font-weight:900; color:#E74C3C; word-wrap:break-word; word-break:break-all; line-height:1.4; padding-top:10px;">${word}</div>`;
                        hintBtn.classList.add('hidden');
                    } else {
                        feedback.textContent = '앗, 다시 한번 해볼까? 🤔 (기회 1번 남았어요!)';
                        feedback.className = 'feedback-text error';
                    }
                }
            },

            revealAnswers() {
                const buttons = document.querySelectorAll('#animal-options .btn-option');
                buttons.forEach(btn => {
                    if (btn.textContent === this.currentAnimal.name) {
                        btn.classList.add('correct');
                    }
                    btn.style.pointerEvents = 'none';
                });
                
                document.getElementById('btn-next-animal').classList.remove('hidden');
                document.getElementById('btn-animal-hint').classList.add('hidden');
            },

            nextQuestion() {
                this.startNextQuestion();
            }
        };
    </script>
</body>
</html>
